# Samba config for the NetRaze integration-test harness.
#
# Every share defined here corresponds to a hard-coded assertion somewhere
# in `crates/getexec-dcerpc/tests/`. Do not rename a share or change its
# `comment` without also updating the matching test expectations.
#
# The goal is to give the Rust side a pinned, deterministic server to talk
# to — so an NDR/NTLMSSP/SMB2 bug surfaces as a semantic mismatch rather
# than "Samba happens to reply differently today".

[global]
    workgroup = NETRAZE
    server string = NetRaze Test Samba
    netbios name = NETRAZE-TEST
    # Force SMB2 only (we don't care about SMB1 on the test path — and
    # auditing both would double CI time for no added coverage).
    server min protocol = SMB2
    server max protocol = SMB3
    # NTLMv2 is the session-setup path our Rust stack implements; the
    # `ntlmv2-only` setting blocks LM/NTLMv1 so a bug can't accidentally
    # "pass" by negotiating a weaker auth variant.
    ntlm auth = ntlmv2-only
    # The image runs as a single Samba instance so no SWAT / CUPS.
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes
    # Quiet log unless we're actively debugging wire behavior. Bump to 5
    # locally and mount /var/log/samba to see the smbd protocol decode.
    log level = 1
    log file = /var/log/samba/log.%m
    # Disable guest by default — the interesting auth paths go through
    # NTLMv2 against the `alice` account. `public` below overrides this.
    map to guest = never
    # Keep the security layer standard: user DB is local passdb (tdbsam),
    # matches what the servercontainers image provisions.
    passdb backend = tdbsam
    security = user

# ---------------------------------------------------------------------------
# Share inventory — pinned. Rust tests assert on names, types, comments.
# ---------------------------------------------------------------------------

# Disk share, authenticated (alice only). Our NetrShareEnum test expects
# this to appear as STYPE_DISKTREE (0) with comment "Alice's private share".
[private]
    comment = Alice's private share
    path = /shares/private
    browseable = yes
    read only = no
    valid users = alice
    create mask = 0600
    directory mask = 0700

# Disk share, guest-readable. Used to test "share reachable without auth"
# code paths. Type STYPE_DISKTREE (0), comment "Public read-only".
[public]
    comment = Public read-only
    path = /shares/public
    browseable = yes
    read only = yes
    guest ok = yes
    # Only this share opts into guest — overrides the global `map to guest`.
    # Anonymous sessions map to the `nobody` account for file operations.

# Explicit ADMIN$ — lets us test the admin-share detection path without
# relying on Samba's default (which is implicitly an admin share when
# `admin users` is set).
[ADMIN$]
    comment = Remote Admin
    path = /shares/admin
    browseable = no
    read only = no
    valid users = alice
    admin users = alice
